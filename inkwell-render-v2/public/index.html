<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Inkwell — Your Writing Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --night:      #0a0a0f;
  --deep:       #0f0f1a;
  --surface:    #141420;
  --card:       #181828;
  --card-hover: #1e1e32;
  --rim:        #2a2a45;
  --gold:       #c9a84c;
  --gold-light: #e2c47a;
  --gold-dim:   #8a6e2a;
  --gold-glow:  rgba(201,168,76,0.15);
  --ivory:      #f0ead8;
  --ivory-mid:  #c8bfa8;
  --ivory-dim:  #7a7060;
  --ivory-ghost:#3a342a;
  --red:        #8b2020;
  --red-light:  #c43030;
  --serif:      'Cormorant Garamond', Georgia, serif;
  --title:      'Cinzel', serif;
  --writing:    'Times New Roman', Times, serif;
}

html{height:100%;scroll-behavior:smooth}
body{
  min-height:100%;
  background-color:var(--night);
  font-family:var(--serif);
  color:var(--ivory);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;opacity:0.6;
}

.ambient{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(80px);opacity:0.18;}
.ambient-1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,#c9a84c,transparent 70%)}
.ambient-2{width:500px;height:500px;bottom:-150px;right:-150px;background:radial-gradient(circle,#3a1a5a,transparent 70%)}
.ambient-3{width:400px;height:400px;top:40%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#1a1a4a,transparent 70%)}

/* ── Pages ── */
.page{display:none;position:relative;z-index:1}
.page.active{display:block;animation:revealPage 0.5s cubic-bezier(.22,1,.36,1)}
@keyframes revealPage{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.wrap{max-width:740px;margin:0 auto;padding:0 24px 140px}

/* ── Typography ── */
.cinzel{font-family:var(--title);font-size:10px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:28px 0 12px;gap:10px;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;
  font-family:var(--serif);font-style:italic;font-size:16px;
  color:var(--ivory-mid);padding:8px 10px 8px 0;
  transition:color 0.2s;-webkit-tap-highlight-color:transparent;
}
.back-btn:hover{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.save-pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--title);font-size:9px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--ivory-dim);padding:6px 12px;border:1px solid var(--rim);border-radius:40px;
  transition:border-color 0.3s,color 0.3s;white-space:nowrap;
}
.save-pill.saving{color:var(--gold-dim);border-color:var(--gold-dim)}
.save-pill.error{color:var(--red-light);border-color:var(--red)}

/* ── Tool buttons ── */
.toolbar{display:flex;align-items:center;gap:8px;margin:16px 0 20px;flex-wrap:wrap;}
.tool-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--rim);border-radius:3px;
  padding:8px 14px;cursor:pointer;
  font-family:var(--title);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--ivory-dim);transition:border-color 0.2s,color 0.2s,background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.tool-btn:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--card-hover)}
.tool-btn:active{transform:scale(0.97)}
.tool-btn.gold{border-color:var(--gold-dim);color:var(--gold);}

/* ── Library ── */
.lib-hero{padding:60px 0 40px}
.lib-hero-eyebrow{margin-bottom:16px}
.lib-hero h1{
  font-family:var(--title);font-size:clamp(36px,9vw,68px);
  font-weight:400;letter-spacing:0.08em;line-height:1;
  background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 40%,var(--gold-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lib-hero-sub{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--ivory-dim);margin-top:10px;}

.ornament{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--gold-dim);}
.ornament hr{flex:1;border:none;border-top:1px solid;opacity:0.3}
.ornament-center{display:flex;align-items:center;gap:8px;opacity:0.6}

/* ── Loading spinner ── */
.spinner-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:16px;color:var(--ivory-dim);
}
.spinner{
  width:32px;height:32px;border:2px solid var(--rim);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-label{font-family:var(--title);font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ivory-dim);}

/* ── Toast ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--gold-dim);border-radius:3px;
  padding:10px 20px;
  font-family:var(--title);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold);opacity:0;transition:opacity 0.3s,transform 0.3s;
  pointer-events:none;z-index:500;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Empty shelf ── */
.empty-shelf{text-align:center;padding:80px 0;border-top:1px solid var(--rim);border-bottom:1px solid var(--rim);}
.empty-shelf-icon{width:56px;height:56px;background:var(--card);border:1px solid var(--rim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.empty-shelf p{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ivory-mid);margin-bottom:6px;}
.empty-shelf small{font-size:14px;color:var(--ivory-dim)}

/* ── Novel card ── */
.novel-card{
  position:relative;background:var(--card);border:1px solid var(--rim);border-radius:4px;
  padding:24px 28px;margin-bottom:12px;cursor:pointer;overflow:hidden;
  transition:background 0.25s,border-color 0.25s,transform 0.2s,box-shadow 0.25s;
}
.novel-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--gold) 0%,var(--gold-dim) 100%);
  opacity:0;transition:opacity 0.25s;
}
.novel-card:hover{background:var(--card-hover);border-color:var(--gold-dim);transform:translateX(2px);box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 0 30px var(--gold-glow);}
.novel-card:hover::before{opacity:1}
.novel-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.novel-card h2{font-family:var(--serif);font-size:clamp(20px,4vw,26px);font-weight:500;color:var(--ivory);line-height:1.2;}
.novel-card h2.untitled{font-style:italic;color:var(--ivory-dim)}
.novel-idea{
  font-family:var(--writing);font-size:14px;line-height:1.7;
  color:var(--ivory-mid);margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.novel-meta{display:flex;align-items:center;gap:8px;font-family:var(--title);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ivory-dim);}
.meta-dot{color:var(--gold-dim)}

/* ── Del btn ── */
.del-btn{background:none;border:none;cursor:pointer;color:var(--ivory-dim);opacity:0.25;padding:6px;margin:-6px;flex-shrink:0;transition:opacity 0.2s,color 0.2s;-webkit-tap-highlight-color:transparent;}
.del-btn:hover{opacity:1;color:var(--red-light)}

/* ── Novel view ── */
#novel-title-input{
  font-family:var(--serif);font-size:clamp(28px,7vw,46px);font-weight:400;font-style:italic;
  color:var(--ivory);background:transparent;border:none;width:100%;
  padding:8px 0 4px;line-height:1.15;-webkit-appearance:none;
}
#novel-title-input:focus{outline:none}
#novel-title-input::placeholder{color:var(--ivory-ghost);font-style:italic}
#novel-stats{font-family:var(--title);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:28px;}

.section-label{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.section-label-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-dim),transparent);opacity:0.4}

#novel-idea{
  width:100%;background:transparent;border:none;resize:none;
  font-family:var(--writing);font-style:normal;font-size:16px;line-height:1.85;
  color:var(--ivory-mid);padding:0;min-height:110px;margin-bottom:36px;
  -webkit-appearance:none;
}
#novel-idea:focus{outline:none}
#novel-idea::placeholder{color:var(--ivory-ghost)}

/* ── Chapter rows ── */
.ch-row{display:flex;align-items:stretch;border-top:1px solid var(--rim);cursor:pointer;transition:background 0.2s;margin:0 -4px;padding:0 4px;border-radius:2px;}
.ch-row:last-child{border-bottom:1px solid var(--rim)}
.ch-row:hover{background:var(--card)}
.ch-num-col{display:flex;align-items:center;justify-content:center;width:44px;flex-shrink:0;padding:18px 0;font-family:var(--title);font-size:10px;letter-spacing:0.2em;color:var(--gold-dim);}
.ch-content-col{flex:1;padding:16px 8px;min-width:0}
.ch-row-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.ch-row h3{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-row h3.untitled{font-style:italic;color:var(--ivory-dim)}
.ch-preview{font-family:var(--writing);font-size:13px;color:var(--ivory-dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-wc{font-family:var(--title);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ivory-dim);margin-top:6px;}
.empty-chapters{text-align:center;padding:48px 0;font-style:italic;font-size:15px;color:var(--ivory-dim);}

/* ── Chapter view ── */
.ch-eyebrow{margin-bottom:8px}
#chapter-title-input{
  font-family:var(--serif);font-size:clamp(24px,6vw,38px);font-weight:500;font-style:italic;
  color:var(--ivory);background:transparent;border:none;width:100%;
  padding:4px 0;line-height:1.2;-webkit-appearance:none;
}
#chapter-title-input:focus{outline:none}
#chapter-title-input::placeholder{color:var(--ivory-ghost)}

.chapter-divider{display:flex;align-items:center;gap:20px;margin:20px 0 28px;color:var(--gold-dim);opacity:0.5;}
.chapter-divider hr{flex:1;border:none;border-top:1px solid var(--gold-dim)}
.chapter-divider-ornament{font-size:18px;letter-spacing:4px}

#chapter-content{
  width:100%;background:transparent;border:none;resize:none;
  font-family:var(--writing);font-style:normal;font-size:18px;line-height:2;
  color:var(--ivory);padding:0;min-height:62vh;
  -webkit-appearance:none;caret-color:var(--gold);
}
#chapter-content:focus{outline:none}
#chapter-content::placeholder{color:var(--ivory-ghost)}

.ch-wc-bar{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:32px;margin-bottom:8px;font-family:var(--title);font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ivory-dim);}
.ch-wc-bar hr{width:60px;border:none;border-top:1px solid var(--rim)}

/* ── FAB ── */
.fab{
  position:fixed;bottom:28px;left:20px;right:20px;max-width:460px;margin:0 auto;
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:linear-gradient(135deg,#c9a84c 0%,#a07a28 100%);
  color:var(--night);border:none;border-radius:3px;padding:18px 32px;
  font-family:var(--title);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;
  cursor:pointer;box-shadow:0 4px 24px rgba(201,168,76,0.35),0 16px 48px rgba(0,0,0,0.5);
  -webkit-tap-highlight-color:transparent;transition:transform 0.15s,box-shadow 0.15s;
}
.fab:active{transform:scale(0.97);box-shadow:0 2px 12px rgba(201,168,76,0.25)}
@media(min-width:600px){.fab{left:auto;right:32px;width:auto}}

/* ── Confirm dialog ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,5,12,0.82);backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center;padding:20px;}
.overlay.open{display:flex;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(min-width:500px){.overlay{align-items:center}}
.dialog{background:var(--card);border:1px solid var(--gold-dim);border-radius:4px;padding:32px 28px 28px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,0.7),inset 0 0 40px var(--gold-glow);animation:revealPage 0.3s cubic-bezier(.22,1,.36,1);}
.dialog h3{font-family:var(--title);font-size:20px;letter-spacing:0.1em;color:var(--gold);margin-bottom:10px;}
.dialog p{font-size:15px;color:var(--ivory-mid);line-height:1.7;margin-bottom:28px;}
.dialog-btns{display:flex;gap:12px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--rim);border-radius:2px;cursor:pointer;font-family:var(--title);font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--ivory-dim);padding:11px 18px;transition:border-color 0.2s,color 0.2s;}
.btn-cancel:hover{border-color:var(--ivory-dim);color:var(--ivory)}
.btn-delete{background:linear-gradient(135deg,#8b2020,#6a1818);border:1px solid #8b2020;border-radius:2px;cursor:pointer;font-family:var(--title);font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--ivory);padding:11px 20px;box-shadow:0 4px 16px rgba(139,32,32,0.35);transition:opacity 0.2s;}
.btn-delete:hover{opacity:0.85}

@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
.pulse{animation:pulse 1.5s ease-in-out infinite}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--rim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
</style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>

<!-- ═══════ LIBRARY ═══════ -->
<div id="page-library" class="page active">
<div class="wrap">
  <div class="lib-hero">
    <div class="cinzel lib-hero-eyebrow" style="display:flex;align-items:center;gap:8px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>
      Inkwell — Shared Library
    </div>
    <h1>Your Library</h1>
    <p class="lib-hero-sub" id="library-sub">Loading your shared library…</p>
  </div>
  <div class="ornament">
    <hr/>
    <div class="ornament-center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <hr/>
  </div>
  <div id="library-list"><div class="spinner-wrap"><div class="spinner"></div><div class="spinner-label">Opening the vault…</div></div></div>
</div>
<button class="fab" onclick="createNovel()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  New Novel
</button>
</div>

<!-- ═══════ NOVEL ═══════ -->
<div id="page-novel" class="page">
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('library')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
      Library
    </button>
    <div class="topbar-right">
      <button class="tool-btn gold" onclick="downloadNovel()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
      <div class="save-pill" id="novel-save-status">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Saved
      </div>
    </div>
  </div>

  <input id="novel-title-input" type="text" placeholder="Title of your novel…" oninput="onNovelMeta()"/>
  <div id="novel-stats"></div>

  <div class="section-label">
    <span class="cinzel">The Premise</span>
    <div class="section-label-line"></div>
  </div>
  <textarea id="novel-idea" rows="5" placeholder="What's the story? The spark, the characters, the world, the haunting question at the heart of it all…" oninput="onNovelMeta()"></textarea>

  <div class="section-label">
    <span class="cinzel">Chapters</span>
    <div class="section-label-line"></div>
  </div>
  <div id="chapter-list"></div>
</div>
<button class="fab" onclick="addChapter()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  New Chapter
</button>
</div>

<!-- ═══════ CHAPTER ═══════ -->
<div id="page-chapter" class="page">
<div class="wrap">
  <div class="topbar">
    <button class="back-btn" onclick="goTo('novel')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span id="chapter-back-label">Novel</span>
    </button>
    <div class="save-pill" id="chapter-save-status">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Saved
    </div>
  </div>

  <div class="cinzel ch-eyebrow" id="chapter-eyebrow-label"></div>
  <input id="chapter-title-input" type="text" placeholder="Chapter title…" oninput="onChapterMeta()"/>

  <div class="toolbar">
    <button class="tool-btn" onclick="doUndo()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      Undo
    </button>
    <button class="tool-btn gold" onclick="downloadChapter()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Chapter
    </button>
  </div>

  <div class="chapter-divider">
    <hr/><div class="chapter-divider-ornament">✦ ✦ ✦</div><hr/>
  </div>

  <textarea id="chapter-content" placeholder="Begin…" oninput="onChapterContent()"></textarea>

  <div class="ch-wc-bar">
    <hr/><span id="chapter-wc-display">0 words</span><hr/>
  </div>
</div>
</div>

<!-- ═══════ CONFIRM ═══════ -->
<div class="overlay" id="confirm-overlay" onclick="closeConfirm()">
  <div class="dialog" onclick="event.stopPropagation()">
    <h3>Are You Certain?</h3>
    <p id="confirm-msg">This cannot be undone.</p>
    <div class="dialog-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-delete" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let novels = [];
let currentNovelId = null;
let currentChapterId = null;
let nTimer = null, cTimer = null;
let undoHistory = [], lastUndoPush = 0;

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6) }
function wc(t){ const s=(t||'').trim(); return s ? s.split(/\s+/).length : 0 }
function esc(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function fmtDate(ts){
  if(!ts) return '';
  const d=new Date(ts), now=new Date(), m=(now-d)/60000;
  if(m<1) return 'just now';
  if(m<60) return Math.floor(m)+'m ago';
  const h=m/60; if(h<24) return Math.floor(h)+'h ago';
  const dy=h/24; if(dy<7) return Math.floor(dy)+'d ago';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
function getNovel(){ return novels.find(n => n.id === currentNovelId) }
function getChapter(){ const n=getNovel(); return n ? n.chapters.find(c => c.id === currentChapterId) : null }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── API calls ─────────────────────────────────────────────────────────────────
async function apiFetch(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiLoadNovels() {
  return apiFetch('GET', '/api/novels');
}

async function apiSaveNovel(novel) {
  return apiFetch('PUT', `/api/novels/${novel.id}`, novel);
}

async function apiDeleteNovel(id) {
  return apiFetch('DELETE', `/api/novels/${id}`);
}

// ── Save logic ────────────────────────────────────────────────────────────────
function scheduleNovelSave(novel) {
  setSave('novel', 'saving');
  clearTimeout(nTimer);
  nTimer = setTimeout(async () => {
    try {
      await apiSaveNovel(novel);
      setSave('novel', 'saved');
    } catch(e) {
      setSave('novel', 'error');
    }
  }, 800);
}

function scheduleChapterSave() {
  const n = getNovel(); if (!n) return;
  n.updated = Date.now();
  setSave('chapter', 'saving');
  clearTimeout(cTimer);
  cTimer = setTimeout(async () => {
    try {
      await apiSaveNovel(n);
      setSave('chapter', 'saved');
    } catch(e) {
      setSave('chapter', 'error');
    }
  }, 800);
}

async function flushSave(target) {
  if (target === 'novel' && nTimer) {
    clearTimeout(nTimer); nTimer = null;
    const n = getNovel(); if (n) await apiSaveNovel(n);
  }
  if (target === 'chapter' && cTimer) {
    clearTimeout(cTimer); cTimer = null;
    const n = getNovel(); if (n) await apiSaveNovel(n);
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
async function goTo(view) {
  if (nTimer) { clearTimeout(nTimer); nTimer = null; const n=getNovel(); if(n) apiSaveNovel(n); }
  if (cTimer) { clearTimeout(cTimer); cTimer = null; const n=getNovel(); if(n) apiSaveNovel(n); }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + view).classList.add('active');
  window.scrollTo(0, 0);
  if (view === 'library') { currentNovelId = null; currentChapterId = null; await loadLibrary(); }
  else if (view === 'novel') { currentChapterId = null; renderNovel(); }
  else if (view === 'chapter') { renderChapter(); }
}

// ── Library ───────────────────────────────────────────────────────────────────
async function loadLibrary() {
  document.getElementById('library-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-label">Loading…</div></div>';
  try {
    novels = await apiLoadNovels();
    renderLibrary();
  } catch(e) {
    document.getElementById('library-list').innerHTML = '<p style="color:var(--red-light);text-align:center;padding:40px;font-style:italic">Could not connect to server. Please refresh.</p>';
  }
}

function renderLibrary() {
  const list = document.getElementById('library-list');
  const sub  = document.getElementById('library-sub');
  sub.textContent = novels.length === 0
    ? 'A blank shelf, awaiting its first volume.'
    : novels.length + ' work' + (novels.length === 1 ? '' : 's') + ' in progress — shared across all writers.';

  if (novels.length === 0) {
    list.innerHTML = `<div class="empty-shelf">
      <div class="empty-shelf-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <p>Begin a story.</p>
      <small>Tap below to start your first novel.</small>
    </div>`;
    return;
  }

  list.innerHTML = novels.map(n => {
    const total = (n.chapters||[]).reduce((s,c) => s + wc(c.content), 0);
    return `<div class="novel-card" onclick="openNovel('${n.id}')">
      <div class="novel-card-top">
        <h2 class="${n.title?'':'untitled'}">${n.title ? esc(n.title) : '<em>Untitled</em>'}</h2>
        <button class="del-btn" onclick="event.stopPropagation();askDel('novel','${n.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      ${n.idea ? `<div class="novel-idea">${esc(n.idea)}</div>` : ''}
      <div class="novel-meta">
        <span>${(n.chapters||[]).length} chapter${(n.chapters||[]).length===1?'':'s'}</span>
        <span class="meta-dot">◆</span>
        <span>${total.toLocaleString()} words</span>
        <span class="meta-dot">◆</span>
        <span>${fmtDate(n.updated)}</span>
      </div>
    </div>`;
  }).join('');
}

function openNovel(id) { currentNovelId = id; goTo('novel'); }

async function createNovel() {
  const n = { id: uid(), title: '', idea: '', chapters: [], created: Date.now(), updated: Date.now() };
  novels.unshift(n);
  await apiSaveNovel(n);
  currentNovelId = n.id;
  goTo('novel');
}

// ── Novel ─────────────────────────────────────────────────────────────────────
function renderNovel() {
  const n = getNovel(); if (!n) { goTo('library'); return; }
  document.getElementById('novel-title-input').value = n.title || '';
  document.getElementById('novel-idea').value = n.idea || '';
  updateNovelStats(); renderChapterList(); setSave('novel', 'saved');
}

function updateNovelStats() {
  const n = getNovel(); if (!n) return;
  const total = (n.chapters||[]).reduce((s,c) => s + wc(c.content), 0);
  document.getElementById('novel-stats').textContent =
    `${(n.chapters||[]).length} chapter${(n.chapters||[]).length===1?'':'s'} · ${total.toLocaleString()} words`;
}

function renderChapterList() {
  const n = getNovel();
  const list = document.getElementById('chapter-list');
  if (!n || n.chapters.length === 0) {
    list.innerHTML = `<div class="empty-chapters">No chapters yet — the page is yours.</div>`;
    return;
  }
  list.innerHTML = n.chapters.map((c,i) => {
    const w = wc(c.content);
    const prev = (c.content||'').replace(/\s+/g,' ').trim();
    return `<div class="ch-row" onclick="openChapter('${c.id}')">
      <div class="ch-num-col">${String(i+1).padStart(2,'0')}</div>
      <div class="ch-content-col">
        <div class="ch-row-head">
          <h3 class="${c.title?'':'untitled'}">${c.title ? esc(c.title) : 'Untitled chapter'}</h3>
          <button class="del-btn" onclick="event.stopPropagation();askDel('chapter','${c.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
        ${prev ? `<div class="ch-preview">${esc(prev.slice(0,110))}${prev.length>110?'…':''}</div>` : ''}
        <div class="ch-wc">${w.toLocaleString()} words</div>
      </div>
    </div>`;
  }).join('');
}

function onNovelMeta() {
  const n = getNovel(); if (!n) return;
  n.title = document.getElementById('novel-title-input').value;
  n.idea  = document.getElementById('novel-idea').value;
  n.updated = Date.now();
  scheduleNovelSave(n);
}

function addChapter() {
  const n = getNovel(); if (!n) return;
  const c = { id: uid(), title: '', content: '' };
  n.chapters.push(c); n.updated = Date.now();
  apiSaveNovel(n);
  currentChapterId = c.id; goTo('chapter');
}

function openChapter(id) { currentChapterId = id; goTo('chapter'); }

// ── Chapter ───────────────────────────────────────────────────────────────────
function renderChapter() {
  const n = getNovel(), c = getChapter(); if (!n||!c) { goTo('novel'); return; }
  const idx = n.chapters.findIndex(x => x.id === c.id);
  document.getElementById('chapter-eyebrow-label').textContent = 'Chapter ' + (idx+1);
  document.getElementById('chapter-back-label').textContent = n.title || 'Novel';
  document.getElementById('chapter-title-input').value = c.title || '';
  document.getElementById('chapter-content').value = c.content || '';
  undoHistory = []; lastUndoPush = 0;
  document.getElementById('chapter-content').addEventListener('keydown', maybePushUndo, { once: false });
  updateChWC(); setSave('chapter', 'saved');
}

function maybePushUndo() {
  const now = Date.now();
  if (now - lastUndoPush > 800) {
    const val = document.getElementById('chapter-content').value;
    undoHistory.push(val);
    if (undoHistory.length > 100) undoHistory.shift();
    lastUndoPush = now;
  }
}

function doUndo() {
  if (undoHistory.length === 0) { showToast('Nothing to undo'); return; }
  const prev = undoHistory.pop();
  const ta = document.getElementById('chapter-content');
  ta.value = prev;
  const c = getChapter();
  if (c) { c.content = prev; updateChWC(); scheduleChapterSave(); }
  ta.focus();
}

function onChapterMeta() {
  const c = getChapter(); if (!c) return;
  c.title = document.getElementById('chapter-title-input').value;
  scheduleChapterSave();
}

function onChapterContent() {
  const c = getChapter(); if (!c) return;
  c.content = document.getElementById('chapter-content').value;
  updateChWC(); scheduleChapterSave();
}

function updateChWC() {
  const c = getChapter(), w = c ? wc(c.content) : 0;
  document.getElementById('chapter-wc-display').textContent = w.toLocaleString() + ' word' + (w===1?'':'s');
}

// ── Save UI ───────────────────────────────────────────────────────────────────
const CHECK = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
const CLOUD = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="pulse"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>`;
const WARN  = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

function setSave(page, status) {
  const el = document.getElementById(page + '-save-status'); if (!el) return;
  el.className = 'save-pill ' + status;
  if (status === 'saving') { el.innerHTML = CLOUD + ' Saving'; }
  else if (status === 'error') { el.innerHTML = WARN + ' Not saved'; }
  else { el.innerHTML = CHECK + ' Saved'; }
}

// ── Download ──────────────────────────────────────────────────────────────────
function triggerDownload(filename, text) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function downloadNovel() {
  const n = getNovel(); if (!n) return;
  const title = n.title || 'Untitled Novel';
  let text = title.toUpperCase() + '\n' + '═'.repeat(title.length) + '\n\n';
  if (n.idea) text += 'PREMISE\n-------\n' + n.idea + '\n\n';
  (n.chapters||[]).forEach((c,i) => {
    text += '\n' + '─'.repeat(40) + '\n';
    text += 'CHAPTER ' + (i+1) + (c.title ? ': ' + c.title.toUpperCase() : '') + '\n';
    text += '─'.repeat(40) + '\n\n' + (c.content||'') + '\n\n';
  });
  triggerDownload((title.replace(/[^a-z0-9]/gi,'_')||'novel') + '.txt', text);
  showToast('Novel downloaded');
}

function downloadChapter() {
  const n = getNovel(), c = getChapter(); if (!n||!c) return;
  const idx = n.chapters.findIndex(x => x.id === c.id);
  const label = 'Chapter ' + (idx+1) + (c.title ? ' - ' + c.title : '');
  let text = label.toUpperCase() + '\n' + '─'.repeat(label.length) + '\n\n' + (c.content||'');
  triggerDownload('chapter_' + (idx+1) + '.txt', text);
  showToast('Chapter downloaded');
}

// ── Delete confirm ────────────────────────────────────────────────────────────
let pending = null;
function askDel(type, id) {
  pending = { type, id };
  document.getElementById('confirm-msg').textContent =
    type === 'novel'
      ? 'Delete this novel and all its chapters for everyone? Every word will be gone.'
      : 'Delete this chapter for everyone? Every word will be gone.';
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { pending = null; document.getElementById('confirm-overlay').classList.remove('open'); }
document.getElementById('confirm-ok-btn').onclick = async function() {
  if (!pending) return;
  if (pending.type === 'novel') {
    await apiDeleteNovel(pending.id);
    novels = novels.filter(n => n.id !== pending.id);
    closeConfirm();
    if (currentNovelId === pending.id) { currentNovelId = null; goTo('library'); } else renderLibrary();
  } else {
    const n = getNovel();
    if (n) { n.chapters = n.chapters.filter(c => c.id !== pending.id); n.updated = Date.now(); await apiSaveNovel(n); }
    closeConfirm();
    if (currentChapterId === pending.id) { currentChapterId = null; goTo('novel'); } else renderChapterList();
  }
};

// ── Boot ──────────────────────────────────────────────────────────────────────
loadLibrary();
</script>
</body>
</html>
